<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foray Extension Settings</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="settings">
      <header>
        <h1>Foray Extension</h1>
        <p>Store the local URL and API token used by the popup.</p>
      </header>

      <form id="settings-form" class="form">
        <label>
          <span>Foray URL</span>
          <input
            id="foray-url"
            name="forayUrl"
            type="url"
            placeholder="http://localhost:3000"
            autocomplete="url"
          />
        </label>

        <label>
          <span>API token</span>
          <input
            id="api-token"
            name="apiToken"
            type="password"
            autocomplete="off"
          />
        </label>

        <button type="submit">Save</button>
      </form>

      <p id="status" class="status" role="status"></p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
